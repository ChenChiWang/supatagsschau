# DGX Spark (GB10) — Ollama + Whisper + Cloudflare Tunnel
# GB10 使用統一記憶體架構（UMA），需要特殊的 ulimit / shm / ipc 設定

services:
  ollama:
    image: ollama/ollama:0.17.5
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - ollama_data:/root/.ollama
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - gpu-network

  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: whisper
    ports:
      - "9000:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-large-v3
    volumes:
      - whisper_cache:/home/ubuntu/.cache/huggingface/hub
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - gpu-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - gpu-network
    depends_on:
      - ollama

volumes:
  ollama_data:
  whisper_cache:

networks:
  gpu-network:
    driver: bridge
